<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sei dentro — IncentivAI</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0E1B3D;color:#FAFAF7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none}
.glow{position:fixed;width:600px;height:600px;background:radial-gradient(ellipse,rgba(201,146,42,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.card{position:relative;z-index:2;text-align:center;max-width:480px}
.check{width:72px;height:72px;background:rgba(46,204,138,.12);border:1px solid rgba(46,204,138,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;font-size:28px;animation:popIn .5s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
h1{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(36px,6vw,56px);font-weight:400;line-height:1.1;letter-spacing:-1px;margin-bottom:20px;opacity:0;animation:fadeUp .7s cubic-bezier(0.16,1,0.3,1) .15s forwards}
h1 em{font-style:italic;color:#E8B44A}
p{font-size:17px;font-weight:300;color:rgba(202,214,230,.7);line-height:1.65;margin-bottom:40px;opacity:0;animation:fadeUp .7s cubic-bezier(0.16,1,0.3,1) .25s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.back{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:rgba(138,154,175,.6);text-decoration:none;transition:color .2s;opacity:0;animation:fadeUp .7s cubic-bezier(0.16,1,0.3,1) .35s forwards}
.back:hover{color:#E8B44A}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="check">✓</div>
  <h1>Perfetto.<br><em>Ti contatto entro 48 ore.</em></h1>
  <p>Sei nella lista di accesso anticipato.<br>Controlla la tua email — ti ho già mandato un messaggio di conferma.</p>
  <a href="index.html" class="back">← Torna al sito</a>
</div>
</body>
</html>
